name: smart_file_share
description: "Smart File Sharing & Collaboration App - Offline First"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Provider for state management across the app
  provider: ^6.1.2
  # SharedPreferences for lightweight local storage (offline-first)
  shared_preferences: ^2.3.4
  # UUID for generating unique IDs for files, versions, and comments
  uuid: ^4.5.1
  # Intl for date formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
