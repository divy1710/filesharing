name: smart_file_share
description: "Smart File Sharing & Collaboration App - Offline First"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Provider for state management across the app
  provider: ^6.1.2
  # Hive for fast local storage (works on web + mobile)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # UUID for generating unique IDs for files, versions, and comments
  uuid: ^4.5.1
  # Intl for date formatting
  intl: ^0.20.2
  # File picker for selecting files from device
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
